<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPNU Assistant Demo</title>
    <style>
        body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .demo-content {
            text-align: center;
            color: #323296;
        }
        .demo-content h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .demo-content p {
            font-size: 1.1em;
            color: #666;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="demo-content">
        <h1>LPNU Assistant</h1>
        <p>
            Intelligent search and navigation system for university information resources.
            Use the chat widget in the bottom-right corner to ask questions.
        </p>
    </div>
    <script src="widget.js"></script>
</body>
</html>
